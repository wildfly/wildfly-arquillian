# This workflow is for a nightly run against WildFly upstream

name: WildFly Test Build

on:
  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/wildfly-build.yml'
  push:
    branches:
      - 'main'
    paths-ignore:
      - '.mvn'
      - '.gitignore'
      - '.gitleaks.toml'
      - 'CODE_OF_CONDUCT.md'
      - 'CODEOWNERS'
      - 'CONTRIBUTING.adoc'
      - 'dco.txt'
      - 'LICENSE.txt'
      - 'mvnw'
      - 'mvnw.cmd'
      - '**/README.adoc'
      - 'SECURITY.md'
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC

# Only run the latest job
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MVN_CMD: './mvnw -V -B -ntp'

jobs:

  wildfly-arquillian-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        profile:
          - ""
          - "'-Pwildfly-preview'"

    steps:
      - uses: actions/checkout@v6
      - uses: wildfly-extras/wildfly-nightly-download@v1
        id: wildfly-nightly
      - name: Set up JDKs
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          cache: 'maven'
          # Please note the order here of having 25 last as that is the version we want to compile with
          java-version: |
            17
            21
            26
            25
      - name: Build and Test on ${{ matrix.os }} ${{ matrix.profile }} - Java 25
        run: ${{ env.MVN_CMD }} clean install '-Dversion.org.wildfly=${{steps.wildfly-nightly.outputs.wildfly-version}}' ${{ matrix.profile }}
      - name: Build and Test on ${{ matrix.os }} ${{ matrix.profile }} - Java 26
        run: ${{ env.MVN_CMD }} verify '-Dversion.org.wildfly=${{steps.wildfly-nightly.outputs.wildfly-version}}' ${{ matrix.profile }} '-Dtest.java.home=${{env.JAVA_HOME_26_X64}}${{env.JAVA_HOME_26_ARM64}}' '-Dtest.report.dir=java26'
      - name: Build and Test on ${{ matrix.os }} ${{ matrix.profile }} - Java 21
        run: ${{ env.MVN_CMD }} verify '-Dversion.org.wildfly=${{steps.wildfly-nightly.outputs.wildfly-version}}' ${{ matrix.profile }} '-Dtest.java.home=${{env.JAVA_HOME_21_X64}}${{env.JAVA_HOME_21_ARM64}}' '-Dtest.report.dir=java21'
      - name: Build and Test on ${{ matrix.os }} ${{ matrix.profile }} - Java 17
        run: ${{ env.MVN_CMD }} verify '-Dversion.org.wildfly=${{steps.wildfly-nightly.outputs.wildfly-version}}' ${{ matrix.profile }} '-Dtest.java.home=${{env.JAVA_HOME_17_X64}}${{env.JAVA_HOME_17_ARM64}}' '-Dtest.report.dir=java17'
      - name: Upload test logs for failed run
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: failure-report-${{ matrix.os }}
          path: |
            **/surefire-reports/**
            **/*.log
